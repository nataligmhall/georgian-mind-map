<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ქართული — word map</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Georgian:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }
    #canvas-container { position: fixed; inset: 0; z-index: 0; }
    canvas { display: block; }

    .label {
      pointer-events: none;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .label .en {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 1px 10px rgba(0,0,0,0.8);
    }
    .label .ka {
      display: block;
      font-family: "Noto Sans Georgian", sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }

    #ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    #ui > * { pointer-events: auto; }

    .overlay-top {
      position: absolute;
      top: 28px;
      left: 28px;
      right: 28px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }

    .brand h1 {
      font-family: "Noto Sans Georgian", sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .brand p { margin-top: 4px; font-size: 0.8rem; color: var(--muted); }
    .brand a {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--accent);
    }

    #hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: var(--faint);
      pointer-events: none;
    }

    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: var(--bg); z-index: 100; color: var(--muted); font-size: 0.85rem;
      transition: opacity 0.5s;
    }
    #loading.done { opacity: 0; pointer-events: none; }

    .theme-menu {
      position: absolute;
      top: 100px;
      left: 28px;
      width: min(220px, 50vw);
      max-height: calc(100vh - 140px);
      overflow-y: auto;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      backdrop-filter: blur(16px);
      display: none;
    }
    .theme-menu.open { display: block; }
    .theme-menu a {
      display: block;
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      text-decoration: none;
    }
    .theme-menu a:hover { background: rgba(255,255,255,0.05); text-decoration: none; }
    .theme-menu a span { color: var(--muted); font-size: 0.75rem; display: block; }
  </style>
</head>
<body>
  <div id="loading">loading…</div>
  <div id="canvas-container"></div>

  <div id="ui">
    <div class="overlay-top">
      <div class="brand">
        <h1>ქართული</h1>
        <p id="stats"></p>
        <div class="core-progress" id="core-progress">
          <div class="core-progress-label">
            <span>core 500</span>
            <span id="core-label">0 / 500</span>
          </div>
          <div class="core-progress-bar">
            <div class="core-progress-fill" id="core-fill" style="width:0%"></div>
          </div>
        </div>
        <a href="#" id="browse-toggle">browse themes</a>
        <a href="review.html" id="review-link">review</a>
      </div>
      <div class="search-wrap">
        <input class="search" id="search" type="search" placeholder="search words" autocomplete="off" />
        <div class="search-results" id="search-results" style="position:absolute;top:calc(100% + 6px);left:0;right:0;max-height:280px;overflow-y:auto;background:rgba(14,14,18,0.95);border:1px solid var(--border);border-radius:12px;display:none;padding:4px;"></div>
      </div>
    </div>

    <nav class="theme-menu" id="theme-menu"></nav>
    <div id="hint">click a dot to open a theme</div>
  </div>

  <script src="dictionary.js"></script>
  <script src="learning.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { CSS2DRenderer, CSS2DObject } from "three/addons/renderers/CSS2DRenderer.js";

    const data = window.DICTIONARY_DATA;
    const statsEl = document.getElementById("stats");
    const loadingEl = document.getElementById("loading");
    const searchInput = document.getElementById("search");
    const searchResults = document.getElementById("search-results");
    const themeMenu = document.getElementById("theme-menu");
    const browseToggle = document.getElementById("browse-toggle");

    const reviewLink = document.getElementById("review-link");
    const coreLabel = document.getElementById("core-label");
    const coreFill = document.getElementById("core-fill");

    function updateHeaderStats() {
      const counts = LearningStore.getCounts();
      const core = LearningStore.getCoreProgress(data);
      statsEl.textContent = `${data.stats.themes} themes · ${data.stats.words} words · ${counts.known} known`;
      reviewLink.textContent = counts.flagged ? `review (${counts.flagged})` : "review";
      coreLabel.textContent = `${core.known} / ${core.total}`;
      coreFill.style.width = `${Math.round(core.pct * 100)}%`;
    }
    updateHeaderStats();

    const pinned = ["verbs", "phrases", "proverbs", "adjectives", "adverbs", "time-expressions"];
    function renderThemeMenu() {
      const menuCategories = [...data.categories].sort((a, b) => {
        const ai = pinned.indexOf(a.id);
        const bi = pinned.indexOf(b.id);
        if (ai >= 0 && bi >= 0) return ai - bi;
        if (ai >= 0) return -1;
        if (bi >= 0) return 1;
        return b.count - a.count;
      });

      themeMenu.innerHTML = menuCategories.map(c => {
        const pct = Math.round(LearningStore.getThemeProgress(c.id, c.count) * 100);
        return `<a href="${c.page}">${c.name}<span>${c.nameKa} · ${c.count}${pct ? ` · <span class="progress">${pct}% known</span>` : ""}</span></a>`;
      }).join("");
    }
    renderThemeMenu();

    browseToggle.addEventListener("click", (e) => {
      e.preventDefault();
      themeMenu.classList.toggle("open");
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        updateHeaderStats();
        renderThemeMenu();
      }
    });

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x08080c, 0.016);

    const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 400);
    camera.position.set(0, 0, 28);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x08080c, 1);
    document.getElementById("canvas-container").appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(innerWidth, innerHeight);
    labelRenderer.domElement.style.cssText = "position:absolute;top:0;pointer-events:none;";
    document.getElementById("canvas-container").appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 8;
    controls.maxDistance = 45;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.35;
    controls.enablePan = false;

    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(2000 * 3);
    for (let i = 0; i < 2000; i++) {
      const r = 60 + Math.random() * 80;
      const t = Math.random() * Math.PI * 2;
      const p = Math.acos(2 * Math.random() - 1);
      starPos[i*3] = r * Math.sin(p) * Math.cos(t);
      starPos[i*3+1] = r * Math.sin(p) * Math.sin(t);
      starPos[i*3+2] = r * Math.cos(p);
    }
    starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x666680, size: 0.3, transparent: true, opacity: 0.45 })));

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const GLOBE_R = 11;
    globeGroup.add(new THREE.Mesh(
      new THREE.SphereGeometry(GLOBE_R, 24, 24),
      new THREE.MeshBasicMaterial({ color: 0x14141c, transparent: true, opacity: 0.3, wireframe: true })
    ));

    globeGroup.add(new THREE.Mesh(
      new THREE.SphereGeometry(0.35, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xf4f4f5 })
    ));

    const themeColors = data.categories.map((_, i) => {
      const hue = (i * 137.508 + 250) % 360;
      return new THREE.Color(`hsl(${hue}, 50%, 70%)`);
    });

    function fibonacciSphere(i, n, r) {
      const g = Math.PI * (3 - Math.sqrt(5));
      const y = 1 - (i / Math.max(n - 1, 1)) * 2;
      const rad = Math.sqrt(Math.max(0, 1 - y * y));
      const t = g * i;
      return new THREE.Vector3(Math.cos(t) * rad * r, y * r, Math.sin(t) * rad * r);
    }

    const themeMeshes = [];
    const clickable = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    data.categories.forEach((cat, i) => {
      const pos = fibonacciSphere(i, data.categories.length, GLOBE_R);
      const baseColor = themeColors[i];
      const progress = LearningStore.getThemeProgress(cat.id, cat.count);
      const color = baseColor.clone().lerp(new THREE.Color(0xf4f4f5), progress * 0.55);
      const group = new THREE.Group();
      group.position.copy(pos);
      group.userData = { category: cat, basePos: pos.clone(), index: i, progress };

      const dotSize = 0.22 + progress * 0.18;
      const dot = new THREE.Mesh(
        new THREE.SphereGeometry(dotSize, 14, 14),
        new THREE.MeshBasicMaterial({ color })
      );
      group.add(dot);

      const label = new CSS2DObject((() => {
        const el = document.createElement("div");
        el.className = "label";
        const pct = progress ? ` · ${Math.round(progress * 100)}%` : "";
        el.innerHTML = `<span class="en">${cat.name}${pct}</span><span class="ka">${cat.nameKa}</span>`;
        return el;
      })());
      label.position.set(0, 0.7, 0);
      group.add(label);

      const line = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), pos]),
        new THREE.LineBasicMaterial({ color: baseColor, transparent: true, opacity: 0.12 + progress * 0.2 })
      );
      globeGroup.add(line);
      group.userData.line = line;

      globeGroup.add(group);
      themeMeshes.push(group);
      clickable.push(dot);
    });

    const searchIndex = [];
    data.categories.forEach(cat => cat.words.forEach(w => searchIndex.push({ ...w, theme: cat })));

    renderer.domElement.addEventListener("click", (e) => {
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hit = raycaster.intersectObjects(clickable)[0];
      if (hit) location.href = hit.object.parent.userData.category.page;
    });

    renderer.domElement.style.cursor = "pointer";

    searchInput.addEventListener("input", () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) { searchResults.style.display = "none"; return; }
      const matches = searchIndex.filter(w =>
        w.ka.includes(q) || w.en.toLowerCase().includes(q) || (w.roman && w.roman.toLowerCase().includes(q))
      ).slice(0, 10);

      searchResults.innerHTML = matches.length
        ? matches.map(w => `<a class="cmd-item" style="display:block;padding:10px 12px;border-radius:8px;color:inherit;text-decoration:none" href="themes/${w.theme.id}.html#${encodeURIComponent(w.ka)}"><div class="ka" style="font-family:'Noto Sans Georgian'">${w.ka}</div><div class="meta" style="font-size:0.75rem;color:var(--muted)">${w.en} · ${w.theme.name}</div></a>`).join("")
        : '<div style="padding:10px;color:var(--muted);font-size:0.8rem">no results</div>';
      searchResults.style.display = "block";
    });

    document.addEventListener("click", (e) => {
      if (!searchResults.contains(e.target) && e.target !== searchInput) {
        searchResults.style.display = "none";
      }
    });

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      themeMeshes.forEach((g, i) => {
        const base = g.userData.basePos;
        const n = base.clone().normalize();
        const up = Math.abs(n.y) > 0.9 ? new THREE.Vector3(1,0,0) : new THREE.Vector3(0,1,0);
        const tan = new THREE.Vector3().crossVectors(n, up).normalize();
        const bit = new THREE.Vector3().crossVectors(n, tan);
        const p = base.clone()
          .add(tan.multiplyScalar(Math.sin(t * 0.35 + i) * 0.05))
          .add(bit.multiplyScalar(Math.cos(t * 0.3 + i) * 0.05))
          .normalize().multiplyScalar(GLOBE_R);
        g.position.copy(p);
        const pts = g.userData.line.geometry.attributes.position;
        pts.setXYZ(1, p.x, p.y, p.z);
        pts.needsUpdate = true;
      });

      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    loadingEl.classList.add("done");
    animate();

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      labelRenderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
